<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外出・移動</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      font-size: 18px;
      color: #333;
    }

    /* ヘッダー */
    #header {
      background: #8B1A1A;
      color: white;
      padding: 16px;
      text-align: center;
    }
    #header h1 { font-size: 24px; font-weight: bold; margin-bottom: 6px; }
    #current-address { font-size: 16px; opacity: 0.9; }

    /* セクション共通 */
    .section { padding: 16px; margin-bottom: 16px; }
    .section-title {
      font-size: 18px; font-weight: bold;
      margin-bottom: 12px; color: #333;
    }

    /* 外出前の確認 */
    #weather-section {
      background: #EBF5FB;
      border: 2px solid #2980B9;
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
    }
    #weather-inner { display: none; }
    #weather-loading { font-size: 16px; color: #555; }
    .weather-row { margin-bottom: 8px; line-height: 1.5; }
    .weather-icon-desc { font-size: 20px; }
    .weather-temp { font-size: 18px; }
    .weather-clothes { font-size: 18px; font-weight: bold; color: #1A5276; }
    .weather-umbrella { font-size: 18px; color: #333; }

    /* ボタン共通 */
    .btn-full {
      display: block; width: 100%;
      height: 64px; font-size: 20px; font-weight: bold;
      border-radius: 8px; border: none;
      color: white; cursor: pointer;
      margin-bottom: 8px;
      text-align: center; line-height: 64px;
      text-decoration: none;
    }
    .btn-full:active { opacity: 0.8; }

    /* 経路ボタン */
    .btn-transit  { background: #27AE60; }
    .btn-walking  { background: #2980B9; }
    .btn-taxi     { background: #F39C12; }

    /* 近くを探す グリッド */
    .nearby-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-nearby {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 80px; font-size: 16px; font-weight: bold;
      background: white; border: 2px solid #CCCCCC;
      border-radius: 8px; cursor: pointer;
      text-decoration: none; color: #333;
      gap: 4px;
    }
    .btn-nearby:active { background: #f0f0f0; }
    .btn-nearby .icon { font-size: 24px; }

    /* 安心情報 */
    .btn-location { background: #8E44AD; }
    .btn-share    { background: #00B900; }

    /* 緊急時 */
    #emergency-section {
      background: #FDEDEC;
      border: 2px solid #E74C3C;
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
    }
    #emergency-section .section-title { color: #C0392B; }
    .btn-hospital-emergency { background: #E74C3C; }
    .btn-119 { background: #C0392B; }
    .btn-110 { background: #2C3E50; }

    /* エラー表示 */
    #geo-error {
      display: none;
      background: #FDEDEC;
      border: 2px solid #E74C3C;
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
      font-size: 16px;
      line-height: 1.7;
      color: #C0392B;
    }
    #net-error {
      display: none;
      background: #FDEDEC;
      border: 2px solid #E74C3C;
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
      text-align: center;
    }
    .btn-reload {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 24px;
      background: #E74C3C; color: white;
      border: none; border-radius: 8px;
      font-size: 16px; cursor: pointer;
    }

    /* スピナー */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #2980B9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- セクション1：ヘッダー -->
<div id="header">
  <h1>🗺️ 外出・移動</h1>
  <div id="current-address">
    <span class="spinner"></span>📍 現在地を取得中...
  </div>
</div>

<!-- 位置情報エラー -->
<div id="geo-error">
  📍 位置情報を許可してください<br><br>
  <strong>設定方法：</strong><br>
  設定 → プライバシーとセキュリティ<br>
  → 位置情報サービス → LINE をオン
</div>

<!-- ネットワークエラー -->
<div id="net-error">
  通信エラーが発生しました<br>
  再読み込みしてください
  <br>
  <button class="btn-reload" onclick="location.reload()">🔄 再読み込み</button>
</div>

<!-- セクション2：外出前の確認 -->
<div id="weather-section">
  <div class="section-title">☀️ 今日の外出チェック</div>
  <div id="weather-loading" style="font-size:16px;color:#555;">
    <span class="spinner"></span>天気を取得中...
  </div>
  <div id="weather-inner">
    <div class="weather-row weather-icon-desc" id="w-desc"></div>
    <div class="weather-row weather-temp"    id="w-temp"></div>
    <div class="weather-row weather-clothes" id="w-clothes"></div>
    <div class="weather-row weather-umbrella" id="w-umbrella"></div>
  </div>
</div>

<!-- セクション3：どうやって行きますか？ -->
<div class="section">
  <div class="section-title">🧭 どうやって行きますか？</div>
  <a id="btn-transit" class="btn-full btn-transit" href="#" target="_blank">
    🚃 電車・バスで行く
  </a>
  <a id="btn-walking" class="btn-full btn-walking" href="#" target="_blank">
    🚶 歩いて行く
  </a>
  <a id="btn-taxi"    class="btn-full btn-taxi"    href="#" target="_blank">
    🚕 タクシーで行く
  </a>
</div>

<!-- セクション4：近くを探す -->
<div class="section">
  <div class="section-title">🔍 近くを探す</div>
  <div class="nearby-grid">
    <a id="btn-hospital"  class="btn-nearby" href="#" target="_blank">
      <span class="icon">🏥</span>病院・クリニック
    </a>
    <a id="btn-pharmacy"  class="btn-nearby" href="#" target="_blank">
      <span class="icon">💊</span>薬局
    </a>
    <a id="btn-super"     class="btn-nearby" href="#" target="_blank">
      <span class="icon">🛒</span>スーパー
    </a>
    <a id="btn-restaurant" class="btn-nearby" href="#" target="_blank">
      <span class="icon">🍽️</span>飲食店
    </a>
    <a id="btn-public"    class="btn-nearby" href="#" target="_blank">
      <span class="icon">🏛️</span>公共施設
    </a>
    <a id="btn-park"      class="btn-nearby" href="#" target="_blank">
      <span class="icon">🌳</span>公園
    </a>
  </div>
</div>

<!-- セクション5：外出中の安心情報 -->
<div class="section">
  <div class="section-title">😊 外出中の安心情報</div>
  <a id="btn-current-loc" class="btn-full btn-location" href="#" target="_blank">
    📍 今いる場所を確認
  </a>
  <button id="btn-share-loc" class="btn-full btn-share" onclick="shareLocation()">
    📤 現在地を家族に送る
  </button>
</div>

<!-- セクション6：緊急時 -->
<div id="emergency-section">
  <div class="section-title">🆘 緊急時</div>
  <a id="btn-emergency-hospital" class="btn-full btn-hospital-emergency" href="#" target="_blank">
    🏥 近くの病院を今すぐ探す
  </a>
  <a class="btn-full btn-119" href="tel:119">
    📞 119番（救急・火事）
  </a>
  <a class="btn-full btn-110" href="tel:110">
    📞 110番（警察）
  </a>
</div>

<script>
var LIFF_ID = "{{ liff_id }}";
var OWM_KEY = "{{ openweather_key }}";
var userLat = null, userLng = null;

// ── LIFF 初期化 ──────────────────────────────
liff.init({ liffId: LIFF_ID }).catch(function(e) {
  console.warn("LIFF init error:", e);
});

// ── Geolocation ───────────────────────────────
function startGeolocation() {
  if (!navigator.geolocation) {
    showGeoError();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    onGeoSuccess,
    onGeoError,
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function onGeoSuccess(pos) {
  userLat = pos.coords.latitude;
  userLng  = pos.coords.longitude;
  updateAllUrls();
  fetchAddress();
  fetchWeather();
}

function onGeoError(err) {
  console.warn("Geolocation error:", err);
  showGeoError();
}

function showGeoError() {
  document.getElementById("current-address").textContent = "⚠️ 位置情報を取得できませんでした";
  document.getElementById("geo-error").style.display = "block";
  document.getElementById("weather-loading").style.display = "none";
}

// ── 全ボタンのURLに現在地を埋め込む ─────────────
function updateAllUrls() {
  var lat = userLat, lng = userLng;
  var enc = encodeURIComponent;

  // 経路
  document.getElementById("btn-transit").href =
    "https://www.google.com/maps/dir/?api=1&travelmode=transit&origin=" + lat + "," + lng;
  document.getElementById("btn-walking").href =
    "https://www.google.com/maps/dir/?api=1&travelmode=walking&origin=" + lat + "," + lng;
  document.getElementById("btn-taxi").href =
    "https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=" + lat + "," + lng;

  // 近くを探す
  document.getElementById("btn-hospital").href =
    "https://www.google.com/maps/search/" + enc("病院") + "/@" + lat + "," + lng + ",15z";
  document.getElementById("btn-pharmacy").href =
    "https://www.google.com/maps/search/" + enc("薬局") + "/@" + lat + "," + lng + ",15z";
  document.getElementById("btn-super").href =
    "https://www.google.com/maps/search/" + enc("スーパー") + "/@" + lat + "," + lng + ",15z";
  document.getElementById("btn-restaurant").href =
    "https://www.google.com/maps/search/" + enc("飲食店") + "/@" + lat + "," + lng + ",15z";
  document.getElementById("btn-public").href =
    "https://www.google.com/maps/search/" + enc("市役所") + "/@" + lat + "," + lng + ",15z";
  document.getElementById("btn-park").href =
    "https://www.google.com/maps/search/" + enc("公園") + "/@" + lat + "," + lng + ",15z";

  // 安心情報
  document.getElementById("btn-current-loc").href =
    "https://www.google.com/maps/@" + lat + "," + lng + ",15z";

  // 緊急病院
  document.getElementById("btn-emergency-hospital").href =
    "https://www.google.com/maps/search/" + enc("病院") + "/@" + lat + "," + lng + ",14z";
}

// ── 逆ジオコーディング（Nominatim） ──────────────
function fetchAddress() {
  fetch(
    "https://nominatim.openstreetmap.org/reverse?lat=" + userLat +
    "&lon=" + userLng + "&format=json&accept-language=ja",
    { headers: { "Accept-Language": "ja" } }
  )
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var addr = data.address;
    var parts = [];
    if (addr.state)        parts.push(addr.state);
    if (addr.city || addr.town || addr.village)
      parts.push(addr.city || addr.town || addr.village);
    if (addr.suburb || addr.neighbourhood)
      parts.push(addr.suburb || addr.neighbourhood);
    var text = parts.length ? "📍 " + parts.join(" ") : "📍 現在地を取得しました ✓";
    document.getElementById("current-address").textContent = text;
  })
  .catch(function(e) {
    console.warn("Nominatim error:", e);
    document.getElementById("current-address").textContent = "📍 現在地を取得しました ✓";
  });
}

// ── OpenWeatherMap ─────────────────────────────
function fetchWeather() {
  if (!OWM_KEY) {
    document.getElementById("weather-loading").style.display = "none";
    return;
  }
  fetch(
    "https://api.openweathermap.org/data/2.5/weather?lat=" + userLat +
    "&lon=" + userLng + "&appid=" + OWM_KEY + "&lang=ja&units=metric"
  )
  .then(function(r) {
    if (!r.ok) throw new Error("weather API " + r.status);
    return r.json();
  })
  .then(function(data) {
    var temp     = Math.round(data.main.temp);
    var tempMax  = Math.round(data.main.temp_max);
    var tempMin  = Math.round(data.main.temp_min);
    var desc     = data.weather[0].description;
    var icon     = data.weather[0].icon;
    var iconUrl  = "https://openweathermap.org/img/wn/" + icon + "@2x.png";
    var humidity = data.main.humidity;

    // 服装アドバイス
    var clothes;
    if (tempMax <= 5)       clothes = "厚手のコートが必要です🧥";
    else if (tempMax <= 15) clothes = "上着を忘れずに🧣";
    else if (tempMax <= 22) clothes = "長袖1枚でOK👕";
    else if (tempMax <= 28) clothes = "半袖でOKですよ👕";
    else                    clothes = "熱中症に注意☀️ 水分補給を忘れずに";

    // 傘アドバイス（湿度で代替）
    var umbrella;
    if (humidity < 60)      umbrella = "傘は不要です☀️";
    else if (humidity < 80) umbrella = "折りたたみ傘があると安心🌂";
    else                    umbrella = "傘を持って出かけましょう☂️";

    document.getElementById("w-desc").innerHTML =
      '<img src="' + iconUrl + '" style="width:32px;height:32px;vertical-align:middle;">' +
      " " + desc;
    document.getElementById("w-temp").textContent =
      "🌡️ 最高 " + tempMax + "℃ / 最低 " + tempMin + "℃（現在 " + temp + "℃）";
    document.getElementById("w-clothes").textContent   = "👗 " + clothes;
    document.getElementById("w-umbrella").textContent  = "☔ " + umbrella;

    document.getElementById("weather-loading").style.display = "none";
    document.getElementById("weather-inner").style.display   = "block";
  })
  .catch(function(e) {
    console.warn("Weather fetch error:", e);
    document.getElementById("weather-section").style.display = "none";
  });
}

// ── 現在地を家族に送る ─────────────────────────
function shareLocation() {
  if (userLat === null) {
    alert("位置情報が取得できていません。少しお待ちください。");
    return;
  }
  var mapsUrl = "https://www.google.com/maps/@" + userLat + "," + userLng + ",15z";
  if (liff.isApiAvailable("shareTargetPicker")) {
    liff.shareTargetPicker([{
      type: "text",
      text: "今ここにいます😊\n" + mapsUrl
    }]).catch(function(e) {
      console.warn("shareTargetPicker error:", e);
      alert("共有に失敗しました。");
    });
  } else {
    // フォールバック：クリップボードにコピー
    var text = "今ここにいます😊\n" + mapsUrl;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        alert("コピーしました！\nLINEで貼り付けて送ってください😊");
      });
    } else {
      alert("この環境ではシェアできません。\n" + mapsUrl);
    }
  }
}

// ── 起動 ─────────────────────────────────────
startGeolocation();
</script>
</body>
</html>
