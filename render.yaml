services:
  - type: web
    name: line-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: LIFF_MAP_ID
        sync: false

  - type: cron
    name: morning-push
    runtime: python
    schedule: "0 22 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python morning_push.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
